<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка заклёпок</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Arial, sans-serif; max-width: 860px;
           margin: 0 auto; padding: 28px 16px 60px; color: #1d1d1f; background: #fafafa; }
    header h1 { font-size: 24px; margin: 0 0 4px; }
    header p { color: #8a8a8e; margin: 0 0 24px; font-size: 14px; }
    section { background: #fff; border: 1px solid #e6e6e9; border-radius: 14px;
              padding: 22px; margin-bottom: 22px; }
    section h2 { margin: 0 0 16px; font-size: 18px; }
    .field { margin: 12px 0; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    input[type=file] { font-size: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    button { padding: 10px 22px; font-size: 15px; font-weight: 600; border: 0;
             border-radius: 10px; background: #0a84ff; color: #fff; cursor: pointer; }
    button:hover { background: #0974e0; }
    button.secondary { background: #eef0f3; color: #1d1d1f; }
    button:disabled { background: #9bc7ff; cursor: default; }
    .status { margin: 14px 0 0; font-weight: 600; color: #0a84ff; min-height: 20px; }
    .progress { height: 8px; background: #e6e6e9; border-radius: 6px; overflow: hidden; margin: 10px 0 0; display: none; }
    .progress.show { display: block; }
    .progress > span { display: block; height: 100%; width: 0; background: #0a84ff; transition: width 0.2s; }
    .progress.indet > span { width: 35%; animation: indet 1.1s ease-in-out infinite; }
    @keyframes indet { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
    .card { display: flex; gap: 16px; align-items: flex-start; border: 1px solid #e6e6e9;
            border-radius: 12px; padding: 16px; margin: 14px 0; }
    .card canvas, .card video { width: 320px; border-radius: 10px; background: #f2f2f5; }
    .info { flex: 1; }
    .info h3 { margin: 0 0 8px; font-size: 14px; word-break: break-all; }
    .meta { font-size: 16px; }
    .meta p { margin: 7px 0; }
    table { border-collapse: collapse; width: 100%; margin-top: 14px; font-size: 13px; }
    th, td { border: 1px solid #e6e6e9; padding: 7px 9px; text-align: left; }
    th { background: #f7f7f9; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>Проверка заклёпок</h1>
  </header>

  <!-- Режим 1: деталь с множеством заклёпок (детектор) -->
  <section>
    <h2>Деталь — несколько заклёпок</h2>
    <div class="field">
      <label>Фото (до 50)</label>
      <input type="file" id="images" accept="image/*" multiple>
    </div>
    <div class="field">
      <label>Видео (до 50)</label>
      <input type="file" id="videos" accept="video/*" multiple>
    </div>
    <div class="actions">
      <button id="analyzeBtn">Проверка нескольких заклёпок</button>
      <button id="historyBtn" class="secondary">История нескольких заклёпок</button>
    </div>
    <div class="status" id="status"></div>
    <div class="progress" id="progress"><span></span></div>
    <div id="results"></div>
    <div id="history"></div>
  </section>

  <!-- Режим 2: одна заклёпка с разных ракурсов (классификатор) -->
  <section>
    <h2>Одна заклёпка — несколько ракурсов</h2>
    <div class="field">
      <label>Ракурсы — фото (несколько)</label>
      <input type="file" id="rivetViews" accept="image/*" multiple>
    </div>
    <div class="field">
      <label>Или ракурсы — видео (каждый кадр = ракурс)</label>
      <input type="file" id="rivetVideo" accept="video/*">
    </div>
    <div class="actions">
      <button id="rivetBtn">Проверить заклёпку</button>
      <button id="rivetHistoryBtn" class="secondary">История заклёпок</button>
    </div>
    <div class="status" id="rivetStatus"></div>
    <div class="progress" id="rivetProgress"><span></span></div>
    <div id="rivetResult"></div>
    <div id="rivetHistory"></div>
  </section>

  <script>
    const btn = document.getElementById("analyzeBtn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    // Отправить файлы на эндпоинт и вернуть результаты по файлам.
    async function sendFiles(files, url) {
      if (files.length === 0) return [];
      const form = new FormData();
      for (const f of files) form.append("files", f);
      const resp = await fetch(url, { method: "POST", body: form });
      if (!resp.ok) throw new Error((await resp.json()).detail || "Ошибка запроса");
      return (await resp.json()).results;
    }

    // Круговая диаграмма годные/брак на SVG (радиус 15.915 -> окружность ≈ 100).
    function donut(percent) {
      return `
        <svg width="86" height="86" viewBox="0 0 36 36" style="float:right; margin:0 0 6px 12px">
          <circle cx="18" cy="18" r="15.915" fill="none" stroke="#34c759" stroke-width="4"/>
          <circle cx="18" cy="18" r="15.915" fill="none" stroke="#ff3b30" stroke-width="4"
                  stroke-dasharray="${percent} ${100 - percent}" stroke-dashoffset="25"/>
          <text x="18" y="20.5" text-anchor="middle" font-size="7" font-weight="700">${percent}%</text>
        </svg>`;
    }

    // График уверенности по каждой заклёпке (столбик = заклёпка, цвет = класс).
    function confidenceChart(detections) {
      if (!detections || detections.length === 0) return "";
      const barW = 24, gap = 10, h = 110, top = 18;
      const w = detections.length * (barW + gap) + 8;
      let bars = "";
      detections.forEach((d, i) => {
        const bh = d.confidence * h;
        const x = 5 + i * (barW + gap);
        const y = top + (h - bh);
        const color = d.at_edge ? "#1f6feb"
          : (d.class_name === "rivet_defect" ? "#ff3b30" : "#34c759");
        const cx = x + barW / 2;
        bars += `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" fill="${color}"/>`;
        bars += `<text x="${cx}" y="${y - 3}" text-anchor="middle" font-size="11">${Math.round(d.confidence * 100)}</text>`;
        bars += `<text x="${cx}" y="${top + h + 16}" text-anchor="middle" font-size="12" font-weight="700">${i + 1}</text>`;
      });
      return `
        <div style="margin-top:14px">
          <div style="font-size:16px; margin-bottom:4px">Уверенность по заклёпкам, % (№ — как на фото)</div>
          <svg viewBox="0 0 ${w} ${top + h + 22}" width="${w}" style="max-width:100%; height:auto">
            ${bars}
            <line x1="0" y1="${top + h}" x2="${w}" y2="${top + h}" stroke="#ccc"/>
          </svg>
        </div>`;
    }

    // Текстовый блок результата детекции (общий для фото и видео).
    function infoBlock(item, extraMeta = "") {
      const s = item.summary;
      const edgeLine = s.edge_ignored ? `<p>Не учтено (обрезаны краем): ${s.edge_ignored}</p>` : "";
      const extraLine = extraMeta ? `<p>${extraMeta}</p>` : "";
      return `
        <h3>${item.filename}</h3>
        ${donut(s.defect_percent)}
        <div class="meta">
          <p>Брак: <b>${s.defect_percent}%</b></p>
          <p>Всего заклёпок (целых): ${s.total} (годных ${s.ok}, брак ${s.defect})</p>
          ${edgeLine}
          <p>Средняя уверенность модели: ${s.avg_confidence}% (не гарантия)</p>
          ${extraLine}
        </div>`;
    }

    // Карточка фото: картинка с рамками и номерами заклёпок.
    function renderImageCard(file, item) {
      const card = document.createElement("div");
      card.className = "card";
      const canvas = document.createElement("canvas");
      const info = document.createElement("div");
      info.className = "info";
      info.innerHTML = infoBlock(item) + confidenceChart(item.detections);
      card.appendChild(canvas);
      card.appendChild(info);
      resultsEl.appendChild(card);

      const img = new Image();
      img.onload = () => {
        const dispW = 320;
        const scale = dispW / img.naturalWidth;
        canvas.width = dispW;
        canvas.height = img.naturalHeight * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        item.detections.forEach((d, i) => {
          const [x1, y1, x2, y2] = d.box;
          const bx = x1 * scale, by = y1 * scale;
          const color = d.at_edge ? "#1f6feb"
            : (d.class_name === "rivet_defect" ? "#ff3b30" : "#34c759");
          ctx.lineWidth = 2;
          ctx.strokeStyle = color;
          ctx.strokeRect(bx, by, (x2 - x1) * scale, (y2 - y1) * scale);
          ctx.fillStyle = color;
          ctx.fillRect(bx, by, 13, 11);
          ctx.fillStyle = "#fff";
          ctx.font = "bold 9px sans-serif";
          ctx.fillText(String(i + 1), bx + 2.5, by + 9);
        });
      };
      img.src = URL.createObjectURL(file);
    }

    // Карточка видео: проигрыватель + проценты.
    function renderVideoCard(file, item) {
      const card = document.createElement("div");
      card.className = "card";
      const video = document.createElement("video");
      video.controls = true;
      video.src = URL.createObjectURL(file);
      const info = document.createElement("div");
      info.className = "info";
      const extra = `Кадров проанализировано: ${item.frames_analyzed}`;
      info.innerHTML = infoBlock(item, extra);
      card.appendChild(video);
      card.appendChild(info);
      resultsEl.appendChild(card);
    }

    // --- Режим 1: детекция (деталь с множеством заклёпок) ---
    btn.addEventListener("click", async () => {
      const images = [...document.getElementById("images").files];
      const videos = [...document.getElementById("videos").files];
      const total = images.length + videos.length;
      if (total === 0) { statusEl.textContent = "Выбери файлы."; return; }
      if (images.length > 50 || videos.length > 50) { statusEl.textContent = "Максимум 50 фото и 50 видео."; return; }

      resultsEl.innerHTML = "";
      btn.disabled = true;
      const prog = document.getElementById("progress");
      const fill = prog.firstElementChild;
      prog.classList.add("show");
      fill.style.width = "0";
      let done = 0;
      const tick = () => { done++; fill.style.width = (done / total * 100) + "%"; statusEl.textContent = `Обработано ${done} из ${total}…`; };

      try {
        // Шлём файлы ПО ОДНОМУ — после каждого двигаем полоску.
        const imgResults = [], vidResults = [];
        for (const f of images) {
          const form = new FormData(); form.append("file", f);
          const resp = await fetch("/analyze/image", { method: "POST", body: form });
          if (!resp.ok) throw new Error((await resp.json()).detail || "Ошибка запроса");
          imgResults.push(await resp.json());
          tick();
        }
        for (const f of videos) {
          const form = new FormData(); form.append("files", f);
          const resp = await fetch("/analyze/videos", { method: "POST", body: form });
          if (!resp.ok) throw new Error((await resp.json()).detail || "Ошибка запроса");
          vidResults.push((await resp.json()).results[0]);
          tick();
        }
        const allResults = [...imgResults, ...vidResults];

        if (allResults.length > 0) {
          const items = allResults.map(r => ({ filename: r.filename, defect_percent: r.summary.defect_percent }));
          const resp = await fetch("/chart/defects", {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(items),
          });
          const { image } = await resp.json();
          const img = document.createElement("img");
          img.src = image;
          img.style.maxWidth = "100%";
          resultsEl.appendChild(img);
        }

        imgResults.forEach((item, i) => renderImageCard(images[i], item));
        vidResults.forEach((item, i) => renderVideoCard(videos[i], item));
        statusEl.textContent = "Готово ✅";
      } catch (e) {
        statusEl.textContent = "Ошибка: " + e.message;
      } finally {
        btn.disabled = false;
        prog.classList.remove("show");
      }
    });

    // История детекции.
    document.getElementById("historyBtn").addEventListener("click", async () => {
      const { history } = await (await fetch("/history")).json();
      const el = document.getElementById("history");
      const dets = history.filter(h => h.file_type !== "rivet");  // только детекция (не заклёпки)
      if (dets.length === 0) { el.innerHTML = "<p>История пуста.</p>"; return; }
      const rows = dets.map(h => `
        <tr>
          <td>${h.created_at.replace("T", " ")}</td>
          <td>${h.filename}</td>
          <td>${h.file_type}</td>
          <td><b>${h.defect_percent}%</b></td>
          <td>${h.total}</td>
        </tr>`).join("");
      el.innerHTML = `
        <h2 style="font-size:18px">История анализов</h2>
        <table>
          <tr><th>Когда</th><th>Файл</th><th>Тип</th><th>Брак</th><th>Заклёпок</th></tr>
          ${rows}
        </table>`;
      el.scrollIntoView({ behavior: "smooth" });
    });

    // --- Режим 2: одна заклёпка — ОТДЕЛЬНЫЙ вердикт для фото и для видео, прогресс n из m ---
    document.getElementById("rivetBtn").addEventListener("click", async () => {
      const photoFiles = [...document.getElementById("rivetViews").files];
      const videoFile = document.getElementById("rivetVideo").files[0];
      const el = document.getElementById("rivetResult");
      const st = document.getElementById("rivetStatus");
      const prog = document.getElementById("rivetProgress");
      const fill = prog.firstElementChild;

      if (photoFiles.length === 0 && !videoFile) { st.textContent = "Выбери фото или видео заклёпки."; return; }

      const total = photoFiles.length + (videoFile ? 1 : 0);
      prog.classList.add("show");
      prog.classList.remove("indet");
      fill.style.width = "0";
      let done = 0;
      const tick = () => { done++; fill.style.width = (done / total * 100) + "%"; st.textContent = `Обработано ${done} из ${total}…`; };

      // Карточка вердикта: заголовок (Фото/Видео) + тело.
      const card = (r, title, body) => {
        const defect = r.verdict === "rivet_defect";
        return `
          <div class="card" style="flex-direction:column">
            <h3 style="font-size:22px; margin:0; color:${defect ? '#ff3b30' : '#34c759'}">
              ${title}: ${defect ? "БРАК" : "ГОДНАЯ"} — вероятность брака ${r.defect_percent}%
            </h3>
            <div class="meta"><p>Уверенность в вердикте: ${r.confidence}% (по худшему из ${r.views.length} ракурсов)</p></div>
            ${body}
          </div>`;
      };

      let html = "";
      try {
        // --- ФОТО: свой отдельный вердикт ---
        if (photoFiles.length > 0) {
          const photoViews = [];
          for (const f of photoFiles) {
            const form = new FormData(); form.append("file", f);
            const resp = await fetch("/classify/view", { method: "POST", body: form });
            if (!resp.ok) throw new Error((await resp.json()).detail || "Ошибка запроса");
            photoViews.push((await resp.json()).defect_percent);
            tick();
          }
          const fresp = await fetch("/rivet/finalize", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ views: photoViews, label: "заклёпка (фото)" }),
          });
          const r = await fresp.json();
          const thumbs = photoFiles.map((f, i) => {
            const v = photoViews[i];
            return `<div style="text-align:center">
              <img src="${URL.createObjectURL(f)}"
                   style="width:110px; height:110px; object-fit:cover; border-radius:8px;
                          border:3px solid ${v >= 50 ? '#ff3b30' : '#34c759'}">
              <div style="font-size:13px; margin-top:3px">фото ${i + 1}: <b>${v}%</b></div>
            </div>`;
          }).join("");
          html += card(r, "Фото", `<div style="display:flex; flex-wrap:wrap; gap:12px">${thumbs}</div>`);
        }

        // --- ВИДЕО: свой отдельный вердикт ---
        if (videoFile) {
          const form = new FormData(); form.append("file", videoFile);
          const resp = await fetch("/analyze/rivet/video", { method: "POST", body: form });
          if (!resp.ok) throw new Error((await resp.json()).detail || "Ошибка запроса");
          const r = await resp.json();
          tick();
          const body = `
            <p class="meta" style="margin:0">Кадров-ракурсов: ${r.views.length}, худший ${Math.max(...r.views)}%</p>
            <video controls src="${URL.createObjectURL(videoFile)}" style="width:320px; border-radius:8px; margin-top:6px"></video>`;
          html += card(r, "Видео", body);
        }

        el.innerHTML = html;
        st.textContent = "";
      } catch (e) {
        st.textContent = "Ошибка: " + e.message;
      } finally {
        prog.classList.remove("show");
      }
    });

    // История заклёпок (только записи режима "rivet").
    document.getElementById("rivetHistoryBtn").addEventListener("click", async () => {
      const { history } = await (await fetch("/history")).json();
      const el = document.getElementById("rivetHistory");
      const rivets = history.filter(h => h.file_type === "rivet");
      if (rivets.length === 0) { el.innerHTML = "<p>История заклёпок пуста.</p>"; return; }
      const rows = rivets.map(h => `
        <tr>
          <td>${h.created_at.replace("T", " ")}</td>
          <td>${h.filename}</td>
          <td style="color:${h.defect ? '#ff3b30' : '#34c759'}"><b>${h.defect ? "БРАК" : "ГОДНАЯ"}</b></td>
          <td>${h.defect_percent}%</td>
        </tr>`).join("");
      el.innerHTML = `
        <h2 style="font-size:18px">История заклёпок</h2>
        <table>
          <tr><th>Когда</th><th>Метка</th><th>Вердикт</th><th>Брак</th></tr>
          ${rows}
        </table>`;
      el.scrollIntoView({ behavior: "smooth" });
    });
  </script>
</body>
</html>
