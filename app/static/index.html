<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка заклепок</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 820px; margin: 30px auto; padding: 0 16px; color: #1d1d1f; }
    h1 { font-size: 22px; }
    .field { margin: 14px 0; }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    button { padding: 10px 20px; font-size: 16px; border: 0; border-radius: 8px; background: #0a84ff; color: #fff; cursor: pointer; }
    button:disabled { background: #9bc7ff; cursor: default; }
    #status { margin: 16px 0; font-weight: 600; color: #0a84ff; min-height: 22px; }
    .card { display: flex; gap: 14px; align-items: flex-start; border: 1px solid #e3e3e6; border-radius: 10px; padding: 14px; margin: 12px 0; }
    .card canvas, .card video { width: 320px; border-radius: 8px; background: #f2f2f5; }
    .info { flex: 1; }
    .info h3 { margin: 0 0 8px; font-size: 14px; word-break: break-all; }
    .meta { font-size: 17px; color: #1d1d1f; margin-top: 8px; }
    .meta p { margin: 7px 0; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; font-size: 13px; }
    th, td { border: 1px solid #e3e3e6; padding: 6px 8px; text-align: left; }
    th { background: #f7f7f9; }
  </style>
</head>
<body>
  <h1>Проверка заклепок</h1>

  <div class="field">
    <label>Фото (до 4):</label>
    <input type="file" id="images" accept="image/*" multiple>
  </div>
  <div class="field">
    <label>Видео (до 4):</label>
    <input type="file" id="videos" accept="video/*" multiple>
  </div>

  <button id="analyzeBtn">Анализ</button>
  <button id="historyBtn" style="background:#555">История</button>

  <div id="status"></div>
  <div id="results"></div>
  <div id="history"></div>

  <script>
    const btn = document.getElementById("analyzeBtn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    // Отправить файлы на эндпоинт и вернуть результаты по файлам.
    async function sendFiles(files, url) {
      if (files.length === 0) return [];
      const form = new FormData();
      for (const f of files) form.append("files", f);
      const resp = await fetch(url, { method: "POST", body: form });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || "Ошибка запроса");
      }
      return (await resp.json()).results;
    }

    // Круговая диаграмма годные/брак на SVG.
    // Радиус 15.915 даёт длину окружности ≈ 100, поэтому процент = длина красной дуги.
    function donut(percent) {
      return `
        <svg width="86" height="86" viewBox="0 0 36 36" style="float:right; margin:0 0 6px 12px">
          <circle cx="18" cy="18" r="15.915" fill="none" stroke="#34c759" stroke-width="4"/>
          <circle cx="18" cy="18" r="15.915" fill="none" stroke="#ff3b30" stroke-width="4"
                  stroke-dasharray="${percent} ${100 - percent}" stroke-dashoffset="25"/>
          <text x="18" y="20.5" text-anchor="middle" font-size="7" font-weight="700">${percent}%</text>
        </svg>`;
    }

    // График уверенности по каждой заклёпке (столбик = заклёпка, цвет = класс).
    function confidenceChart(detections) {
      if (!detections || detections.length === 0) return "";
      const barW = 24, gap = 10, h = 110, top = 18;
      const w = detections.length * (barW + gap) + 8;
      let bars = "";
      detections.forEach((d, i) => {
        const bh = d.confidence * h;
        const x = 5 + i * (barW + gap);
        const y = top + (h - bh);
        const color = d.at_edge ? "#1f6feb"
          : (d.class_name === "rivet_defect" ? "#ff3b30" : "#34c759");
        const cx = x + barW / 2;
        bars += `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" fill="${color}"/>`;
        bars += `<text x="${cx}" y="${y - 3}" text-anchor="middle" font-size="11">${Math.round(d.confidence * 100)}</text>`;
        bars += `<text x="${cx}" y="${top + h + 16}" text-anchor="middle" font-size="12" font-weight="700">${i + 1}</text>`;
      });
      return `
        <div style="margin-top:14px">
          <div style="font-size:16px; margin-bottom:4px">Уверенность по заклёпкам, % (№ — как на фото)</div>
          <svg viewBox="0 0 ${w} ${top + h + 22}" width="${w}" style="max-width:100%; height:auto">
            ${bars}
            <line x1="0" y1="${top + h}" x2="${w}" y2="${top + h}" stroke="#ccc"/>
          </svg>
        </div>`;
    }

    // Текстовый блок результата (общий для фото и видео).
    function infoBlock(item, extraMeta = "") {
      const s = item.summary;
      const edgeLine = s.edge_ignored
        ? `<p>Не учтено (обрезаны краем): ${s.edge_ignored}</p>`
        : "";
      const extraLine = extraMeta ? `<p>${extraMeta}</p>` : "";
      return `
        <h3>${item.filename}</h3>
        ${donut(s.defect_percent)}
        <div class="meta">
          <p>Брак: <b>${s.defect_percent}%</b></p>
          <p>Всего заклёпок (целых): ${s.total} (годных ${s.ok}, брак ${s.defect})</p>
          ${edgeLine}
          <p>Средняя уверенность модели: ${s.avg_confidence}% (не гарантия)</p>
          ${extraLine}
        </div>`;
    }

    // Карточка фото: рисуем картинку с рамками и номерами заклёпок.
    function renderImageCard(file, item) {
      const card = document.createElement("div");
      card.className = "card";
      const canvas = document.createElement("canvas");
      const info = document.createElement("div");
      info.className = "info";
      info.innerHTML = infoBlock(item) + confidenceChart(item.detections);
      card.appendChild(canvas);
      card.appendChild(info);
      resultsEl.appendChild(card);

      const img = new Image();
      img.onload = () => {
        const dispW = 320;
        const scale = dispW / img.naturalWidth;  // координаты YOLO в пикселях оригинала -> умножаем на scale
        canvas.width = dispW;
        canvas.height = img.naturalHeight * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        item.detections.forEach((d, i) => {
          const [x1, y1, x2, y2] = d.box;
          const bx = x1 * scale, by = y1 * scale;
          // синий = краевая (не в счёте), красный = брак, зелёный = годная
          const color = d.at_edge ? "#1f6feb"
            : (d.class_name === "rivet_defect" ? "#ff3b30" : "#34c759");
          ctx.lineWidth = 2;
          ctx.strokeStyle = color;
          ctx.strokeRect(bx, by, (x2 - x1) * scale, (y2 - y1) * scale);
          // номер-бейдж (тот же № в графике уверенности)
          ctx.fillStyle = color;
          ctx.fillRect(bx, by, 13, 11);
          ctx.fillStyle = "#fff";
          ctx.font = "bold 9px sans-serif";
          ctx.fillText(String(i + 1), bx + 2.5, by + 9);
        });
      };
      img.src = URL.createObjectURL(file);
    }

    // Карточка видео: проигрыватель + проценты (рамки по кадрам не рисуем).
    function renderVideoCard(file, item) {
      const card = document.createElement("div");
      card.className = "card";
      const video = document.createElement("video");
      video.controls = true;
      video.src = URL.createObjectURL(file);
      const info = document.createElement("div");
      info.className = "info";
      const extra = `кадров проанализировано: ${item.frames_analyzed} (каждые ${item.frame_step} кадра, ${item.fps} fps)`;
      info.innerHTML = infoBlock(item, extra);
      card.appendChild(video);
      card.appendChild(info);
      resultsEl.appendChild(card);
    }

    btn.addEventListener("click", async () => {
      const images = document.getElementById("images").files;
      const videos = document.getElementById("videos").files;

      resultsEl.innerHTML = "";
      btn.disabled = true;
      statusEl.textContent = "Сканирование…";

      try {
        const imgResults = await sendFiles(images, "/analyze/images");
        const vidResults = await sendFiles(videos, "/analyze/videos");
        const allResults = [...imgResults, ...vidResults];

        // Общий график "процент брака по файлам" (matplotlib на сервере).
        if (allResults.length > 0) {
          const items = allResults.map(r => ({
            filename: r.filename,
            defect_percent: r.summary.defect_percent,
          }));
          const resp = await fetch("/chart/defects", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(items),
          });
          const { image } = await resp.json();
          const img = document.createElement("img");
          img.src = image;
          img.style.maxWidth = "100%";
          resultsEl.appendChild(img);
        }

        // Результаты в том же порядке, что файлы — связываем по индексу.
        imgResults.forEach((item, i) => renderImageCard(images[i], item));
        vidResults.forEach((item, i) => renderVideoCard(videos[i], item));

        statusEl.textContent = "Готово ✅";
      } catch (e) {
        statusEl.textContent = "Ошибка: " + e.message;
      } finally {
        btn.disabled = false;
      }
    });

    // Кнопка "История": берём записи из БД и рисуем таблицу.
    document.getElementById("historyBtn").addEventListener("click", async () => {
      const { history } = await (await fetch("/history")).json();
      const historyEl = document.getElementById("history");
      if (history.length === 0) {
        historyEl.innerHTML = "<p>История пуста.</p>";
        return;
      }
      const rows = history.map(h => `
        <tr>
          <td>${h.created_at.replace("T", " ")}</td>
          <td>${h.filename}</td>
          <td>${h.file_type}</td>
          <td><b>${h.defect_percent}%</b></td>
          <td>${h.total}</td>
        </tr>`).join("");
      historyEl.innerHTML = `
        <h2 style="font-size:18px">История анализов</h2>
        <table>
          <tr><th>Когда</th><th>Файл</th><th>Тип</th><th>Брак</th><th>Заклёпок</th></tr>
          ${rows}
        </table>`;
      historyEl.scrollIntoView({ behavior: "smooth" });
    });
  </script>
</body>
</html>
